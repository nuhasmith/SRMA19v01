<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login Petugas - SRMA 19 Bantul</title>
    <link rel="icon" type="image/webp" href="srma.webp">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0d6efd;
            --primary-dark: #0a58ca;
            --tg-blue: #2e8bc0;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(160deg, #0b1e3d 0%, #0d2b5e 25%, #0f3a7a 50%, #0a1e42 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }
        .login-wrapper {
            width: 100%;
            max-width: 420px;
        }
        .login-card {
            background: #ffffff;
            border-radius: 24px;
            padding: 40px 32px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.3);
            animation: fadeInUp 0.5s ease-out;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }
        .login-header .brand {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 72px;
            height: 72px;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 16px;
            box-shadow: 0 8px 24px rgba(13, 110, 253, 0.25);
        }
        .login-header .brand img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .login-header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 4px;
        }
        .login-header p {
            color: #64748b;
            font-size: 0.9rem;
            margin: 0;
        }
        .form-label {
            font-weight: 600;
            font-size: 0.85rem;
            color: #334155;
            margin-bottom: 6px;
        }
        .form-control {
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 0.95rem;
            border: 1px solid #e2e8f0;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(13, 110, 253, 0.15);
        }
        .input-group .form-control {
            border-radius: 0 12px 12px 0 !important;
        }
        .input-group-text {
            border-radius: 12px 0 0 12px !important;
            background: #fff;
            border-right: none;
            padding: 0 14px;
        }
        .input-group-text.toggle-password {
            border-radius: 0 12px 12px 0 !important;
            border-left: none;
            cursor: pointer;
            background: #fff;
            user-select: none;
        }
        .btn-login {
            background: var(--tg-blue);
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 13px;
            font-weight: 700;
            font-size: 1rem;
            width: 100%;
            box-shadow: 0 6px 20px rgba(46, 139, 192, 0.35);
            transition: background 0.2s, transform 0.1s;
        }
        .btn-login:hover {
            background: #256a94;
            transform: translateY(-1px);
        }
        .btn-login:active {
            transform: translateY(0);
        }
        .btn-login:disabled {
            opacity: 0.65;
            pointer-events: none;
        }
        .form-footer {
            text-align: center;
            margin-top: 24px;
        }
        .form-footer a {
            color: var(--tg-blue);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
        }
        .form-footer a:hover {
            text-decoration: underline;
        }
        .alert {
            border-radius: 12px;
            font-size: 0.85rem;
            padding: 12px 16px;
        }
        .link-lupa-pin {
            font-size: 0.85rem;
            color: var(--tg-blue);
            cursor: pointer;
            text-decoration: underline;
        }
        .link-lupa-pin:hover {
            color: #256a94;
        }
        .preload-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0,0,0,0.6);
            z-index: 9999;
            display: none;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
        }
        .preload-overlay.show {
            display: flex;
        }
        .back-home {
            display: inline-block;
            margin-top: 16px;
            color: #64748b;
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.2s;
        }
        .back-home:hover {
            color: var(--tg-blue);
        }
        @media (max-width: 480px) {
            .login-card {
                padding: 28px 20px;
            }
            .login-header h1 {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>

<div class="preload-overlay" id="preloadOverlay">
    <div class="text-center">
        <div class="spinner-border text-light mb-3" role="status"></div>
        <div>Menyiapkan data...</div>
        <div class="small opacity-75 mt-2" id="preloadStatus"></div>
    </div>
</div>

<div class="login-wrapper">
    <div class="login-card">
        <div class="login-header">
            <div class="brand">
                <img src="srma.webp" alt="SRMA 19 Bantul">
            </div>
            <h1>Login Petugas</h1>
            <p>SRMA 19 Bantul</p>
        </div>

        <form id="loginForm" autocomplete="off">
            <div id="alertContainer"></div>

            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-user text-muted"></i></span>
                    <input type="text" class="form-control" id="username" placeholder="Masukkan username" required>
                </div>
            </div>

            <div class="mb-4">
                <label for="pin" class="form-label">PIN</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock text-muted"></i></span>
                    <input type="password" class="form-control" id="pin" placeholder="Masukkan PIN" maxlength="6" inputmode="numeric" pattern="[0-9]*" required>
                    <span class="input-group-text toggle-password" id="togglePin" title="Tampilkan PIN">
                        <i class="far fa-eye"></i>
                    </span>
                </div>
            </div>

            <button type="submit" class="btn btn-login" id="btnLogin">
                <i class="fas fa-sign-in-alt me-2"></i>Masuk
            </button>
        </form>

        <div class="text-center mt-3">
            <span class="link-lupa-pin" onclick="showResetModal()"><i class="fas fa-question-circle me-1"></i>Lupa PIN?</span>
        </div>

        <div class="form-footer">
            <a href="index.html"><i class="fas fa-arrow-left me-1"></i>Kembali ke Beranda</a>
        </div>
    </div>
    <p class="text-center text-white opacity-50 mt-3" style="font-size:0.8rem;">&copy; 2026 SRMA 19 Bantul</p>
</div>

<!-- Modal Reset PIN -->
<div class="modal fade" id="resetPinModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 rounded-4">
            <div class="modal-header border-0">
                <h5 class="modal-title fw-bold">Reset PIN</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <p class="text-muted small">Masukkan username Anda. PIN akan direset ke <strong>123456</strong>.</p>
                <input type="text" class="form-control" id="resetUsername" placeholder="Username" required>
            </div>
            <div class="modal-footer border-0">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
                <button type="button" class="btn btn-primary" id="resetBtn" onclick="resetPin()">
                    <i class="fas fa-sync-alt me-1"></i>Reset PIN
                </button>
            </div>
        </div>
    </div>
</div>

<script src="api.js"></script>
<script src="auth.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // ==================== REDIRECT JIKA SUDAH LOGIN ====================
    if (Auth.isLoggedIn()) {
        const user = Auth.getCurrentUser();
        window.location.replace(user.role === 'admin' ? 'dashboard_admin.html' : 'dashboard_petugas.html');
    }

    // ==================== DOM REFS ====================
    const loginForm = document.getElementById('loginForm');
    const alertContainer = document.getElementById('alertContainer');
    const btnLogin = document.getElementById('btnLogin');
    const usernameInput = document.getElementById('username');
    const pinInput = document.getElementById('pin');
    const togglePin = document.getElementById('togglePin');
    const preloadOverlay = document.getElementById('preloadOverlay');
    const preloadStatus = document.getElementById('preloadStatus');

    // ==================== FOCUS AWAL ====================
    window.addEventListener('load', () => usernameInput.focus());

    // ==================== TOGGLE PIN VISIBILITY ====================
    togglePin.addEventListener('click', () => {
        const isPassword = pinInput.type === 'password';
        pinInput.type = isPassword ? 'text' : 'password';
        togglePin.innerHTML = isPassword ? '<i class="far fa-eye-slash"></i>' : '<i class="far fa-eye"></i>';
        togglePin.title = isPassword ? 'Sembunyikan PIN' : 'Tampilkan PIN';
        pinInput.focus();
    });

    // ==================== SHOW ALERT ====================
    function showAlert(message, type = 'danger') {
        alertContainer.innerHTML = `<div class="alert alert-${type} alert-dismissible fade show" role="alert">${message}<button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button></div>`;
    }

    // ==================== PRELOAD DATA & REDIRECT ====================
    async function preloadAllData(role) {
        preloadOverlay.classList.add('show');
        preloadStatus.textContent = 'Mengambil data peserta...';

        try {
            const [pesertaRes, absensiRes, jadwalRes, petugasRes, izinRes, waliRes, alumniRes] = await Promise.all([
                API.listPeserta(),
                API.listAbsensi('', '', 1, 1000),
                API.getJadwal(),
                API.listPetugas(),
                API.listIzin(),
                API.listWaliAsuh(),
                API.listAlumni()
            ]);

            preloadStatus.textContent = 'Menyimpan data ke cache...';

            const data = {
                peserta: pesertaRes.status === 'success' ? pesertaRes.data : [],
                absensi: absensiRes.status === 'success' ? absensiRes.data : [],
                jadwal: jadwalRes.status === 'success' ? jadwalRes.data : [],
                petugas: petugasRes.status === 'success' ? petugasRes.data : [],
                izin: izinRes.status === 'success' ? izinRes.data : [],
                waliAsuh: waliRes.status === 'success' ? waliRes.data : [],
                alumni: alumniRes.status === 'success' ? alumniRes.data : [],
                timestamp: Date.now()
            };

            const cacheKey = role === 'admin' ? 'srma19_admin_data' : 'srma19_petugas_data';
            localStorage.setItem(cacheKey, JSON.stringify(data));

            preloadStatus.textContent = 'Data siap, mengalihkan...';

            setTimeout(() => {
                if (role === 'admin') {
                    window.location.href = 'dashboard_admin.html';
                } else {
                    window.location.href = 'dashboard_petugas.html';
                }
            }, 500);

        } catch (e) {
            console.error('Preload gagal:', e);
            preloadStatus.textContent = 'Mengalihkan tanpa data...';
            setTimeout(() => {
                if (role === 'admin') {
                    window.location.href = 'dashboard_admin.html';
                } else {
                    window.location.href = 'dashboard_petugas.html';
                }
            }, 500);
        }
    }

    // ==================== LOGIN SUBMIT ====================
    loginForm.addEventListener('submit', async function(e) {
        e.preventDefault();
        alertContainer.innerHTML = '';

        const username = usernameInput.value.trim();
        const pin = pinInput.value.trim();

        if (!username) { showAlert('Username wajib diisi.', 'warning'); usernameInput.focus(); return; }
        if (!pin) { showAlert('PIN wajib diisi.', 'warning'); pinInput.focus(); return; }
        if (pin.length < 4) { showAlert('PIN minimal 4 karakter.', 'warning'); pinInput.focus(); return; }

        btnLogin.disabled = true;
        btnLogin.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Memeriksa...';

        try {
            const result = await Auth.login(username, pin);
            if (result.success) {
                showAlert('✅ Login berhasil! Menyiapkan data...', 'success');
                await preloadAllData(result.user.role);
            } else {
                showAlert('❌ ' + (result.message || 'Username atau PIN salah.'), 'danger');
                btnLogin.disabled = false;
                btnLogin.innerHTML = '<i class="fas fa-sign-in-alt me-2"></i>Masuk';
                pinInput.value = '';
                pinInput.focus();
            }
        } catch (error) {
            showAlert('⚠️ Gagal terhubung ke server.', 'danger');
            btnLogin.disabled = false;
            btnLogin.innerHTML = '<i class="fas fa-sign-in-alt me-2"></i>Masuk';
        }
    });

    // ==================== RESET PIN ====================
    function showResetModal() {
        const modal = new bootstrap.Modal(document.getElementById('resetPinModal'));
        modal.show();
    }

    async function resetPin() {
        const username = document.getElementById('resetUsername').value.trim();
        if (!username) { alert('Username wajib diisi!'); return; }
        const resetBtn = document.getElementById('resetBtn');
        resetBtn.disabled = true;
        resetBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>Memproses...';
        try {
            const res = await API.resetPin(username);
            if (res.status === 'ok') {
                alert('✅ ' + res.message);
                bootstrap.Modal.getInstance(document.getElementById('resetPinModal')).hide();
                document.getElementById('resetUsername').value = '';
            } else {
                alert('❌ ' + res.message);
            }
        } catch (e) {
            alert('⚠️ Gagal terhubung ke server.');
        }
        resetBtn.disabled = false;
        resetBtn.innerHTML = '<i class="fas fa-sync-alt me-1"></i>Reset PIN';
    }

    // ==================== PRELOAD SAAT LOAD HALAMAN (jika cache kosong) ====================
    window.addEventListener('load', function() {
        const adminCache = localStorage.getItem('srma19_admin_data');
        const petugasCache = localStorage.getItem('srma19_petugas_data');
        if (!adminCache && !petugasCache) {
            console.log('Cache kosong, melakukan silent preload...');
        }
    });
</script>
</body>
</html>
