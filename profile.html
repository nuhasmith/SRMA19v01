<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Profil Pengguna - SRMA 19 Bantul</title>
    <link rel="icon" type="image/webp" href="srma.webp">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0d6efd; --tg-blue: #2e8bc0; }
        body {
            font-family: 'Inter', sans-serif; background: #f0f2f5; display: flex;
            align-items: center; justify-content: center; min-height: 100vh; padding: 20px; margin: 0;
        }
        .profile-card {
            background: #fff; border-radius: 24px; padding: 32px 24px; max-width: 480px;
            width: 100%; box-shadow: 0 15px 40px rgba(0,0,0,0.08);
        }
        .avatar-section { display: flex; flex-direction: column; align-items: center; margin-bottom: 24px; }
        .avatar-wrapper { position: relative; width: 100px; height: 100px; }
        .avatar-wrapper img {
            width: 100%; height: 100%; border-radius: 50%; object-fit: cover;
            border: 4px solid var(--tg-blue);
        }
        .avatar-wrapper .upload-icon {
            position: absolute; bottom: 0; right: 0; background: var(--tg-blue);
            color: #fff; border-radius: 50%; width: 32px; height: 32px;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            font-size: 0.9rem; box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }
        .avatar-wrapper .upload-icon:hover { transform: scale(1.1); }
        #fotoInput { display: none; }
        .form-label { font-weight: 600; font-size: 0.85rem; color: #334155; margin-bottom: 4px; }
        .form-control, .form-select { border-radius: 12px; padding: 10px 14px; font-size: 0.9rem; }
        .input-group .form-control { border-radius: 0 12px 12px 0 !important; }
        .input-group-text { border-radius: 12px 0 0 12px !important; background: #fff; border-right: none; padding: 0 14px; }
        .input-group-text.toggle-password { border-radius: 0 12px 12px 0 !important; border-left: none; cursor: pointer; background: #fff; user-select: none; }
        .btn-primary { background: var(--tg-blue); border: none; border-radius: 12px; padding: 12px; font-weight: 600; }
        .btn-outline-secondary { border-radius: 12px; padding: 12px; font-weight: 500; }
        .alert { border-radius: 12px; font-size: 0.85rem; }

        /* Responsive */
        @media (max-width: 480px) {
            .profile-card { padding: 24px 16px; }
        }
    </style>
</head>
<body>
<div class="profile-card">
    <!-- Avatar -->
    <div class="avatar-section">
        <div class="avatar-wrapper">
            <img id="avatarPreview" alt="Avatar">
            <label for="fotoInput" class="upload-icon" title="Ganti foto">
                <i class="fas fa-camera"></i>
            </label>
            <input type="file" id="fotoInput" accept="image/*" onchange="previewFoto(this)">
        </div>
        <h5 class="fw-bold mt-2 mb-0" id="displayName"></h5>
        <small class="text-muted" id="displayRole"></small>
    </div>

    <!-- Alert -->
    <div id="alertContainer"></div>

    <!-- Form -->
    <form id="profileForm">
        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" class="form-control" id="usernameField" disabled>
        </div>
        <div class="mb-3">
            <label class="form-label">Nama</label>
            <input type="text" class="form-control" id="namaInput" placeholder="Nama lengkap" required>
        </div>
        <div class="mb-3">
            <label class="form-label">PIN Baru <small class="text-muted">(kosongkan jika tidak ingin ganti)</small></label>
            <div class="input-group">
                <span class="input-group-text"><i class="fas fa-lock text-muted"></i></span>
                <input type="password" class="form-control" id="pinInput" placeholder="Min 4 digit" minlength="4" maxlength="6">
                <span class="input-group-text toggle-password" id="togglePin" title="Tampilkan PIN">
                    <i class="far fa-eye"></i>
                </span>
            </div>
        </div>
        <div class="d-grid gap-2 mt-4">
            <button type="submit" class="btn btn-primary" id="saveBtn">
                <i class="fas fa-save me-2"></i>Simpan Perubahan
            </button>
            <a href="#" id="backLink" class="btn btn-outline-secondary">
                <i class="fas fa-arrow-left me-2"></i>Kembali
            </a>
        </div>
    </form>
</div>

<script src="api.js"></script>
<script src="auth.js"></script>
<script>
    // ==================== AUTH ====================
    if (!Auth.requireAuth('login.html')) throw new Error('Silakan login.');
    const currentUser = Auth.getCurrentUser();
    document.getElementById('displayName').textContent = currentUser.nama || 'Petugas';
    document.getElementById('displayRole').textContent = currentUser.role || 'petugas';
    document.getElementById('usernameField').value = currentUser.username;

    // Tombol kembali sesuai role
    const backLink = document.getElementById('backLink');
    if (currentUser.role === 'admin') {
        backLink.href = 'dashboard_admin.html';
    } else {
        backLink.href = 'dashboard_petugas.html';
    }

    // ==================== TOGGLE PIN ====================
    const pinInput = document.getElementById('pinInput');
    const togglePin = document.getElementById('togglePin');
    togglePin.addEventListener('click', () => {
        const isPassword = pinInput.type === 'password';
        pinInput.type = isPassword ? 'text' : 'password';
        togglePin.innerHTML = isPassword ? '<i class="far fa-eye-slash"></i>' : '<i class="far fa-eye"></i>';
        togglePin.title = isPassword ? 'Sembunyikan PIN' : 'Tampilkan PIN';
        pinInput.focus();
    });

    // ==================== PLACEHOLDER INISIAL ====================
    function generateInitialAvatar(name) {
        const canvas = document.createElement('canvas');
        canvas.width = 100; canvas.height = 100;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#2e8bc0';
        ctx.beginPath(); ctx.arc(50, 50, 50, 0, Math.PI * 2); ctx.fill();
        const initial = (name || 'P').charAt(0).toUpperCase();
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 40px Inter, sans-serif';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(initial, 50, 50);
        return canvas.toDataURL();
    }

    // ==================== LOAD PROFILE ====================
    async function loadProfile() {
        try {
            const res = await API.getProfile(currentUser.username);
            if (res.status === 'success' && res.data) {
                document.getElementById('namaInput').value = res.data.Nama || '';
                if (res.data.Foto && res.data.Foto.startsWith('data:image')) {
                    document.getElementById('avatarPreview').src = res.data.Foto;
                } else {
                    document.getElementById('avatarPreview').src = generateInitialAvatar(res.data.Nama || currentUser.nama);
                }
            } else {
                document.getElementById('avatarPreview').src = generateInitialAvatar(currentUser.nama);
            }
        } catch (e) {
            document.getElementById('avatarPreview').src = generateInitialAvatar(currentUser.nama);
        }
    }
    loadProfile();

    // ==================== PREVIEW FOTO ====================
    function previewFoto(input) {
        if (input.files && input.files[0]) {
            if (input.files[0].size > 500000) {
                alert('Ukuran foto terlalu besar. Maksimal 500KB.');
                input.value = '';
                return;
            }
            const reader = new FileReader();
            reader.onload = e => {
                document.getElementById('avatarPreview').src = e.target.result;
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    // ==================== SUBMIT ====================
    document.getElementById('profileForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const alertContainer = document.getElementById('alertContainer');
        alertContainer.innerHTML = '';

        const nama = document.getElementById('namaInput').value.trim();
        const pin = document.getElementById('pinInput').value.trim();
        const fotoInput = document.getElementById('fotoInput');

        if (!nama) {
            alertContainer.innerHTML = '<div class="alert alert-warning">Nama wajib diisi.</div>';
            return;
        }

        let foto = null;
        if (fotoInput.files && fotoInput.files[0]) {
            const reader = new FileReader();
            try {
                foto = await new Promise((resolve, reject) => {
                    reader.onload = (e) => resolve(e.target.result);
                    reader.onerror = () => reject(new Error('Gagal membaca file'));
                    reader.readAsDataURL(fotoInput.files[0]);
                });
            } catch(err) {
                alertContainer.innerHTML = '<div class="alert alert-danger">Gagal membaca file foto.</div>';
                return;
            }
        }

        const data = {
            username: currentUser.username,
            nama: nama,
            pin: pin || undefined,
            foto: foto || undefined
        };

        const saveBtn = document.getElementById('saveBtn');
        saveBtn.disabled = true;
        saveBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Menyimpan...';

        try {
            const res = await API.updateProfile(data);
            if (res.status === 'ok') {
                currentUser.nama = nama;
                localStorage.setItem('srma19_auth', JSON.stringify(currentUser));
                document.getElementById('displayName').textContent = nama;
                alertContainer.innerHTML = '<div class="alert alert-success">✅ Profil berhasil diperbarui!</div>';
                document.getElementById('pinInput').value = '';
                document.getElementById('fotoInput').value = '';

                // Perbarui cache di sessionStorage jika ada
                ['srma19_admin_data','srma19_petugas_data'].forEach(key => {
                    const cache = JSON.parse(sessionStorage.getItem(key) || '{}');
                    if (cache && cache.petugas) {
                        const idx = cache.petugas.findIndex(p => p.Username === currentUser.username);
                        if (idx >= 0) {
                            cache.petugas[idx].Nama = nama;
                            if (foto) cache.petugas[idx].Foto = foto;
                            sessionStorage.setItem(key, JSON.stringify(cache));
                        }
                    }
                });
            } else {
                alertContainer.innerHTML = `<div class="alert alert-danger">❌ ${res.message}</div>`;
            }
        } catch (err) {
            alertContainer.innerHTML = '<div class="alert alert-danger">⚠️ Gagal terhubung ke server.</div>';
        } finally {
            saveBtn.disabled = false;
            saveBtn.innerHTML = '<i class="fas fa-save me-2"></i>Simpan Perubahan';
        }
    });
</script>
</body>
</html>
