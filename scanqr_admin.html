<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scan QR Admin - SRMA 19 Bantul</title>
    <link rel="icon" type="image/webp" href="srma.webp">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script src="api.js"></script>
    <script src="auth.js"></script>
    <style>
        :root {
            --primary: #0d6efd;
            --primary-dark: #0a58ca;
            --accent: #ff6b35;
            --success: #10b981;
            --bg-body: #f4f6f9;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-body);
            min-height: 100vh;
            padding: 12px;
        }
        .container-custom {
            max-width: 520px;
            margin: 0 auto;
        }
        .card-modern {
            background: #fff;
            border-radius: 14px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            padding: 16px 20px;
            margin-bottom: 16px;
        }
        .badge-sesi {
            border-radius: 50px;
            padding: 4px 12px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .badge-active { background: #d1fae5; color: #065f46; }
        .badge-outside { background: #fef3c7; color: #92400e; }
        .badge-manual { background: #ede9fe; color: #5b21b6; }
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #ccc;
            border-radius: 24px;
            transition: 0.3s;
        }
        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background: white;
            border-radius: 50%;
            transition: 0.3s;
        }
        input:checked + .toggle-slider { background: #8b5cf6; }
        input:checked + .toggle-slider:before { transform: translateX(20px); }
        #reader {
            width: 100%;
            border-radius: 10px;
            overflow: hidden;
            border: 2px dashed #d0d0d0;
            background: #f8f8f8;
            min-height: 220px;
        }
        .log-item {
            padding: 8px 0;
            border-bottom: 1px solid #f5f5f5;
            font-size: 0.82rem;
            display: flex;
            justify-content: space-between;
        }
        .log-item:last-child { border-bottom: none; }
        .btn-confirm { background: #10b981; color: #fff; border: none; border-radius: 10px; padding: 10px; width: 100%; font-weight: 600; }
        .btn-scan { border-radius: 10px; font-weight: 600; padding: 10px; width: 100%; }
        .pulse-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: #10b981;
            display: inline-block;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%,100% { box-shadow: 0 0 0 0 rgba(16,185,129,0.6); }
            50% { box-shadow: 0 0 0 10px rgba(16,185,129,0); }
        }
        @media (max-width: 480px) {
            .container-custom { padding: 8px; }
            #reader { min-height: 200px; }
        }
        .header-scan {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .btn-back {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #475569;
            text-decoration: none;
            transition: all 0.2s;
        }
        .btn-back:hover {
            background: #f1f5f9;
            color: #0d6efd;
        }
    </style>
</head>
<body>

<div class="container-custom">
    <!-- Header -->
    <div class="header-scan">
        <a href="dashboard_admin.html" class="btn-back"><i class="fas fa-arrow-left"></i></a>
        <h5 class="fw-bold mb-0"><i class="fas fa-qrcode me-2" style="color:#0d6efd;"></i>Scan QR Admin</h5>
        <button class="btn btn-sm btn-outline-secondary rounded-pill" id="soundToggleBtn" onclick="toggleSound()" title="Suara">
            <i class="fas fa-volume-up"></i>
        </button>
    </div>

    <!-- ===== Sesi Info ===== -->
    <div class="card-modern">
        <div class="d-flex justify-content-between align-items-center">
            <div>
                <div class="small text-muted">Sesi Saat Ini</div>
                <strong id="currentSessionName" class="text-dark">Memuat...</strong>
            </div>
            <div class="text-end">
                <span class="badge-sesi badge-active" id="currentSessionBadge">
                    <i class="fas fa-clock me-1"></i><span id="currentTime">--:--</span>
                </span>
            </div>
        </div>
        
        <!-- Mode Manual -->
        <div class="mt-2 pt-2 border-top">
            <div class="d-flex align-items-center gap-2 mb-2">
                <label class="toggle-switch">
                    <input type="checkbox" id="manualModeSwitch" onchange="toggleManualMode()">
                    <span class="toggle-slider"></span>
                </label>
                <span class="small fw-semibold"><i class="fas fa-user-shield me-1"></i>Mode Manual (Admin)</span>
            </div>
            <div id="manualSessionSelector" style="display:none;">
                <select class="form-select form-select-sm" id="manualSessionSelect" onchange="onManualSessionChange()">
                    <option value="">-- Pilih Sesi --</option>
                </select>
                <button class="btn btn-sm btn-outline-success rounded-pill" onclick="showCustomSessionForm()">
                    <i class="fas fa-plus-circle me-1"></i>Sesi Baru
                </button>
            </div>
            <!-- Custom Sesi -->
            <div id="customSessionForm" class="custom-session-form" style="display:none;margin-top:10px;background:#f8fafc;padding:12px;border-radius:10px;border:1px solid #e2e8f0;">
                <div class="row g-2">
                    <div class="col-12">
                        <label class="small fw-semibold">Nama Sesi</label>
                        <input type="text" class="form-control form-control-sm" id="customSesiNama" placeholder="Contoh: Sholat Isya (Khusus)">
                    </div>
                    <div class="col-6">
                        <label class="small fw-semibold">Mulai</label>
                        <input type="time" class="form-control form-control-sm" id="customSesiMulai">
                    </div>
                    <div class="col-6">
                        <label class="small fw-semibold">Selesai</label>
                        <input type="time" class="form-control form-control-sm" id="customSesiSelesai">
                    </div>
                    <div class="col-12">
                        <div class="d-flex gap-2">
                            <button class="btn btn-sm btn-success w-50" onclick="applyCustomSession()">Gunakan Sesi Ini</button>
                            <button class="btn btn-sm btn-outline-secondary w-50" onclick="cancelCustomSession()">Batal</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== Scanner ===== -->
    <div class="card-modern p-3">
        <div id="reader" style="width:100%;border-radius:10px;overflow:hidden;border:2px dashed #d0d0d0;background:#f8f8f8;min-height:220px;"></div>
        <div class="mt-3 text-center">
            <button class="btn btn-primary rounded-pill" id="btnStartScan" onclick="startScan()">
                <i class="fas fa-camera me-2"></i>Mulai Scan
            </button>
            <button class="btn btn-danger rounded-pill d-none" id="btnStopScan" onclick="stopScan()">
                <i class="fas fa-stop me-2"></i>Hentikan
            </button>
        </div>
    </div>

    <!-- ===== Hasil Scan & Form ===== -->
    <div id="resultContainer" class="d-none mt-3">
        <div class="card-modern p-3" id="resultCard">
            <h6 class="fw-bold mb-2"><i class="fas fa-info-circle me-2"></i>Data Peserta</h6>
            <div class="text-center">
                <div id="resultAvatar" style="width:60px;height:60px;border-radius:50%;background:#e0f2fe;display:inline-flex;align-items:center;justify-content:center;font-size:1.5rem;font-weight:800;color:var(--primary);">?</div>
                <div class="mt-2">
                    <div class="fw-bold" id="resultNama">-</div>
                    <div class="text-muted small"><span id="resultKode">-</span> &bull; <span id="resultJK">-</span> &bull; <span id="resultAgama">-</span></div>
                    <div><span class="badge-sesi" id="resultSesi">-</span></div>
                </div>
                
                <!-- ===== Form Tambahan ===== -->
                <div class="form-section mt-3">
                    <label>Status Kehadiran</label>
                    <select class="form-select form-select-sm" id="statusKehadiranSelect" onchange="toggleIzinUpload()">
                        <option value="Hadir">Hadir</option>
                        <option value="Izin">Izin</option>
                        <option value="Tidak Berangkat">Tidak Berangkat</option>
                        <option value="Sakit">Sakit</option>
                    </select>
                    
                    <!-- Upload Surat (hanya muncul jika status 'Izin') -->
                    <div id="izinUploadContainer" style="display:none; margin-top:10px;">
                        <label class="small fw-semibold">Upload Bukti Surat (max 50KB)</label>
                        <input type="file" accept="image/*" class="form-control form-control-sm" id="izinBuktiSurat">
                        <small class="text-muted">Format: JPG, PNG. Maksimal 50KB.</small>
                    </div>

                    <label class="mt-2 small">Puasa</label>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="puasa" id="puasaYa" value="Ya" checked>
                        <label class="form-check-label" for="puasaYa">Ya</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="puasa" id="puasaTidak" value="Tidak">
                        <label class="form-check-label" for="puasaTidak">Tidak</label>
                    </div>

                    <label class="mt-2 small">Pelanggaran</label>
                    <select class="form-select form-select-sm" id="pelanggaranSelect">
                        <option value="Tidak Ada">Tidak Ada</option>
                        <option value="Ringan">Ringan</option>
                        <option value="Sedang">Sedang</option>
                        <option value="Berat">Berat</option>
                    </select>
                    <div id="pelanggaranKeteranganContainer" class="mt-1" style="display:none;">
                        <input type="text" class="form-control form-control-sm" id="pelanggaranKeterangan" placeholder="Keterangan...">
                    </div>

                    <label class="mt-2 small">Kesehatan</label>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="kesehatan" id="kesehatanSehat" value="Sehat" checked>
                        <label class="form-check-label" for="kesehatanSehat">Sehat</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="kesehatan" id="kesehatanSakit" value="Sakit">
                        <label class="form-check-label" for="kesehatanSakit">Sakit</label>
                    </div>
                    <div id="kesehatanKeteranganContainer" class="mt-1" style="display:none;">
                        <input type="text" class="form-control form-control-sm" id="kesehatanKeterangan" placeholder="Keterangan...">
                    </div>
                </div>

                <button class="btn-confirm mt-3" id="btnConfirm" onclick="confirmAbsensi()">
                    <i class="fas fa-check-circle me-1"></i> Konfirmasi Absensi
                </button>
                <button class="btn btn-outline-secondary btn-sm rounded-pill mt-1 w-100" onclick="resetScan()">
                    <i class="fas fa-redo me-1"></i> Scan Ulang
                </button>
            </div>
        </div>
    </div>

    <!-- ===== Log Absensi ===== -->
    <div class="card-modern">
        <div class="d-flex justify-content-between align-items-center">
            <h6 class="fw-bold mb-0"><i class="fas fa-list-alt me-2" style="color:var(--accent);"></i>Log Absensi</h6>
            <button class="btn btn-sm btn-outline-secondary rounded-pill" onclick="clearLocalLog()"><i class="fas fa-trash-alt"></i></button>
        </div>
        <div id="logContainer" style="max-height:200px;overflow-y:auto;"></div>
    </div>

    <!-- Status Koneksi -->
    <div class="text-center mt-2 small text-muted" id="connectionStatus">
        <span class="pulse-dot me-1"></span>Memeriksa koneksi...
    </div>
</div>

<script>
    // ============================================================
    //  1. AUTH
    // ============================================================
    if (!Auth.requireAuth('login.html')) throw new Error('Silakan login.');
    const user = Auth.getCurrentUser();
    if (user.role !== 'admin') {
        window.location.href = 'dashboard_petugas.html';
        throw new Error('Akses ditolak');
    }
    window.currentUser = user;

    // ============================================================
    //  2. STATE
    // ============================================================
    let html5QrCode = null;
    let isScanning = false;
    let currentScanData = null;
    let scanCooldown = false;
    let localLog = [];
    let isManualMode = false;
    let manualSesi = null;
    let sesiList = [];
    let soundEnabled = true;
    let beepAudio = null;
    let audioReady = false;
    const isAdmin = user.role === 'admin';

    // ============================================================
    //  3. SOUND (BEEP)
    // ============================================================
    const SOUND_KEY = 'srma19_sound_enabled';

    function initBeepAudio() {
        if (beepAudio) return;
        try {
            beepAudio = new Audio('beep.mp3');
            beepAudio.volume = 0.6;
            beepAudio.load();
            audioReady = true;
        } catch(e) { beepAudio = null; }
    }

    function unlockAudio() {
        if (beepAudio) {
            try {
                const testAudio = new Audio('beep.mp3');
                testAudio.volume = 0;
                testAudio.play().then(() => {
                    testAudio.pause();
                    testAudio.currentTime = 0;
                    audioReady = true;
                }).catch(() => {});
            } catch(e) {}
        }
    }

    function playBeep() {
        if (!soundEnabled) return;
        initBeepAudio();
        unlockAudio();
        if (beepAudio) {
            try {
                beepAudio.currentTime = 0;
                beepAudio.play();
            } catch(e) {
                fallbackBeep();
            }
        } else {
            fallbackBeep();
        }
    }

    function fallbackBeep() {
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            if (ctx.state === 'suspended') ctx.resume();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'sine';
            osc.frequency.value = 880;
            gain.gain.value = 0.3;
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start();
            osc.stop(ctx.currentTime + 0.2);
        } catch(e) {}
    }

    function toggleSound() {
        soundEnabled = !soundEnabled;
        localStorage.setItem(SOUND_KEY, soundEnabled);
        const icon = document.getElementById('soundToggleBtn').querySelector('i');
        icon.className = soundEnabled ? 'fas fa-volume-up' : 'fas fa-volume-mute';
    }

    // ============================================================
    //  4. FETCH JADWAL
    // ============================================================
    async function fetchJadwal() {
        try {
            const res = await API.getJadwal();
            if (res.status === 'success' && res.data.length > 0) {
                sesiList = res.data.map(j => ({
                    kode: String(j.id),
                    nama: j.nama,
                    agama: j.agama,
                    mulai: j.mulai,
                    selesai: j.selesai
                }));
            } else {
                sesiList = [
                    { kode: '1', nama: 'Apel Pagi', agama: 'Islam', mulai: '06:00', selesai: '06:30' },
                    { kode: '2', nama: 'Makan Pagi', agama: 'Islam', mulai: '06:30', selesai: '07:15' },
                    { kode: '3', nama: 'Ibadah Sholat Dhuhur', agama: 'Islam', mulai: '12:00', selesai: '12:30' },
                    { kode: '4', nama: 'Apel Makan Siang', agama: 'Islam', mulai: '12:30', selesai: '12:45' },
                    { kode: '5', nama: 'Makan Siang', agama: 'Islam', mulai: '12:45', selesai: '13:30' },
                    { kode: '6', nama: 'Ibadah Sholat Ashar', agama: 'Islam', mulai: '15:00', selesai: '15:30' },
                    { kode: '7', nama: 'Ibadah Sholat Maghrib', agama: 'Islam', mulai: '17:45', selesai: '18:15' },
                    { kode: '8', nama: 'Apel Makan Malam', agama: 'Islam', mulai: '18:15', selesai: '18:30' },
                    { kode: '9', nama: 'Makan Malam', agama: 'Islam', mulai: '18:30', selesai: '19:15' },
                    { kode: '10', nama: 'Apel Malam', agama: 'Islam', mulai: '21:00', selesai: '21:30' }
                ];
            }
        } catch (e) { console.error('Gagal fetch jadwal:', e); }
        initManualSelect();
    }

    function initManualSelect() {
        const select = document.getElementById('manualSessionSelect');
        if (!select) return;
        select.innerHTML = '<option value="">-- Pilih Sesi --</option>';
        sesiList.forEach(s => {
            const opt = document.createElement('option');
            opt.value = s.kode;
            opt.textContent = `[${s.agama}] ${s.nama} (${s.mulai}-${s.selesai})`;
            select.appendChild(opt);
        });
    }

    // ============================================================
    //  5. UPDATE SESI DISPLAY
    // ============================================================
    function updateSesiDisplay() {
        const now = new Date();
        const currentTime = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
        document.getElementById('currentTime').textContent = currentTime;

        if (isAdmin && isManualMode && manualSesi) {
            if (manualSesi.kode && manualSesi.kode.startsWith('custom_')) {
                document.getElementById('currentSessionName').textContent = `[Custom] ${manualSesi.nama} (Manual)`;
            } else {
                document.getElementById('currentSessionName').textContent = `[${manualSesi.agama}] ${manualSesi.nama} (Manual)`;
            }
            document.getElementById('currentSessionBadge').className = 'badge-sesi badge-manual';
        } else {
            const currentMinutes = now.getHours() * 60 + now.getMinutes();
            let found = null;
            for (const s of sesiList) {
                const [h1, m1] = s.mulai.split(':').map(Number);
                const [h2, m2] = s.selesai.split(':').map(Number);
                const start = h1 * 60 + m1;
                const end = h2 * 60 + m2;
                if (currentMinutes >= start && currentMinutes <= end) {
                    found = s;
                    break;
                }
            }
            if (found) {
                document.getElementById('currentSessionName').textContent = `[${found.agama}] ${found.nama}`;
                document.getElementById('currentSessionBadge').className = 'badge-sesi badge-active';
            } else {
                document.getElementById('currentSessionName').textContent = 'Di luar sesi';
                document.getElementById('currentSessionBadge').className = 'badge-sesi badge-outside';
            }
        }
    }

    // ============================================================
    //  6. MANUAL MODE (ADMIN)
    // ============================================================
    function toggleManualMode() {
        if (!isAdmin) return;
        isManualMode = document.getElementById('manualModeSwitch').checked;
        const selector = document.getElementById('manualSessionSelector');
        if (selector) selector.style.display = isManualMode ? 'block' : 'none';
        if (!isManualMode) {
            manualSesi = null;
            document.getElementById('currentSessionName').textContent = 'Menunggu scan...';
            document.getElementById('currentSessionBadge').className = 'badge-sesi badge-active';
            cancelCustomSession();
        }
        saveManualState();
    }

    function onManualSessionChange() {
        const kode = document.getElementById('manualSessionSelect').value;
        if (kode) {
            const sesiObj = sesiList.find(s => s.kode === kode);
            if (sesiObj) {
                manualSesi = { kode: sesiObj.kode, nama: sesiObj.nama, agama: sesiObj.agama };
                document.getElementById('currentSessionName').textContent = `[${sesiObj.agama}] ${sesiObj.nama} (Manual)`;
                document.getElementById('currentSessionBadge').className = 'badge-sesi badge-manual';
                cancelCustomSession();
            }
        } else {
            manualSesi = null;
            updateSesiDisplay();
        }
        saveManualState();
    }

    function saveManualState() {
        if (!isAdmin) return;
        sessionStorage.setItem('srma19_absensi_state', JSON.stringify({ manualMode: isManualMode, manualSesi }));
    }

    function restoreManualState() {
        if (!isAdmin) return;
        const saved = sessionStorage.getItem('srma19_absensi_state');
        if (!saved) return;
        try {
            const state = JSON.parse(saved);
            if (state.manualMode) {
                isManualMode = true;
                const switchEl = document.getElementById('manualModeSwitch');
                if (switchEl) switchEl.checked = true;
                const selector = document.getElementById('manualSessionSelector');
                if (selector) selector.style.display = 'block';
                if (state.manualSesi) {
                    setTimeout(() => {
                        const select = document.getElementById('manualSessionSelect');
                        const found = sesiList.find(s => s.kode === state.manualSesi.kode);
                        if (found) {
                            select.value = state.manualSesi.kode;
                            onManualSessionChange();
                        } else if (state.manualSesi.kode && state.manualSesi.kode.startsWith('custom_')) {
                            manualSesi = state.manualSesi;
                            document.getElementById('currentSessionName').textContent = `[Custom] ${manualSesi.nama} (Manual)`;
                            document.getElementById('currentSessionBadge').className = 'badge-sesi badge-manual';
                        }
                    }, 100);
                }
            }
        } catch(e) {}
    }

    function showCustomSessionForm() {
        document.getElementById('customSessionForm').style.display = 'block';
        document.getElementById('manualSessionSelect').disabled = true;
        const now = new Date();
        const currentTime = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
        document.getElementById('customSesiMulai').value = currentTime;
        document.getElementById('customSesiSelesai').value = '';
    }

    function cancelCustomSession() {
        document.getElementById('customSessionForm').style.display = 'none';
        document.getElementById('manualSessionSelect').disabled = false;
        document.getElementById('customSesiNama').value = '';
        document.getElementById('customSesiMulai').value = '';
        document.getElementById('customSesiSelesai').value = '';
    }

    function applyCustomSession() {
        const nama = document.getElementById('customSesiNama').value.trim();
        const mulai = document.getElementById('customSesiMulai').value;
        const selesai = document.getElementById('customSesiSelesai').value;
        if (!nama) { window.showToast('Nama sesi wajib diisi.', 'error'); return; }
        if (!mulai) { window.showToast('Waktu mulai wajib diisi.', 'error'); return; }
        manualSesi = {
            kode: 'custom_' + Date.now(),
            nama: nama,
            agama: 'Custom',
            mulai: mulai,
            selesai: selesai || '23:59'
        };
        document.getElementById('currentSessionName').textContent = `[Custom] ${nama} (${mulai} - ${selesai || '23:59'})`;
        document.getElementById('currentSessionBadge').className = 'badge-sesi badge-manual';
        document.getElementById('manualSessionSelect').value = '';
        cancelCustomSession();
        saveManualState();
        window.showToast('✅ Sesi kustom "' + nama + '" dipilih.', 'success');
    }

    // ============================================================
    //  7. Toggle Upload Surat jika status 'Izin'
    // ============================================================
    function toggleIzinUpload() {
        const status = document.getElementById('statusKehadiranSelect').value;
        const container = document.getElementById('izinUploadContainer');
        if (status === 'Izin') {
            container.style.display = 'block';
        } else {
            container.style.display = 'none';
            document.getElementById('izinBuktiSurat').value = '';
        }
    }

    // ============================================================
    //  8. SCAN QR – OPTIMASI CEPAT, MIRING/TERBALIK
    // ============================================================
    async function startScan() {
        if (isScanning) return;
        unlockAudio();
        if (soundEnabled) playBeep();
        const reader = document.getElementById('reader');
        if (reader) reader.classList.add('scanning');
        try {
            html5QrCode = new Html5Qrcode('reader');
            const config = { 
                fps: 60, 
                qrbox: { width: 500, height: 500 }, 
                aspectRatio: 1.0 
            };
            await html5QrCode.start({ facingMode: 'environment' }, config, onScanSuccess, () => {});
            isScanning = true;
            document.getElementById('btnStartScan').classList.add('d-none');
            document.getElementById('btnStopScan').classList.remove('d-none');
            window.showToast('Kamera siap. Arahkan ke QR Code.', 'success');
        } catch (err) {
            if (reader) reader.classList.remove('scanning');
            window.showToast('Gagal mengakses kamera.', 'error');
        }
    }

    async function stopScan() {
        if (!isScanning || !html5QrCode) return;
        await html5QrCode.stop();
        isScanning = false;
        const reader = document.getElementById('reader');
        if (reader) reader.classList.remove('scanning');
        document.getElementById('btnStartScan').classList.remove('d-none');
        document.getElementById('btnStopScan').classList.add('d-none');
        html5QrCode.clear();
        html5QrCode = null;
    }

    function onScanSuccess(decodedText) {
        if (scanCooldown) return;
        scanCooldown = true;
        if (soundEnabled) playBeep();
        const code = decodedText.trim();
        API.searchPeserta(code).then(data => {
            if (data.status === 'success') {
                let finalSesi, finalSesiNama, dalamSesi, manual;
                if (isAdmin && isManualMode && manualSesi) {
                    finalSesi = manualSesi.kode;
                    finalSesiNama = manualSesi.nama;
                    dalamSesi = true;
                    manual = true;
                } else {
                    finalSesi = data.sesi;
                    finalSesiNama = data.sesi_nama;
                    dalamSesi = data.dalam_sesi;
                    manual = false;
                }
                currentScanData = {
                    code: data.code,
                    nama: data.nama,
                    jk: data.jk,
                    agama: data.agama,
                    sesi: finalSesi,
                    sesi_nama: finalSesiNama,
                    dalam_sesi: dalamSesi,
                    manual: manual,
                    timestamp: new Date().toISOString()
                };
                displayResult();
                setTimeout(() => { scanCooldown = false; }, 800);
            } else {
                window.showToast(data.message || 'Peserta tidak ditemukan.', 'error');
                resetScan();
                setTimeout(() => { scanCooldown = false; }, 800);
            }
        }).catch(() => {
            window.showToast('Gagal menghubungi server.', 'error');
            resetScan();
            setTimeout(() => { scanCooldown = false; }, 800);
        });
    }

    function displayResult() {
        const d = currentScanData;
        document.getElementById('resultNama').textContent = d.nama;
        document.getElementById('resultKode').textContent = d.code;
        document.getElementById('resultJK').textContent = d.jk || '-';
        document.getElementById('resultAgama').textContent = d.agama || '-';
        document.getElementById('resultSesi').textContent = d.sesi_nama + (d.manual ? ' (Manual)' : '');
        document.getElementById('resultAvatar').textContent = d.nama.charAt(0).toUpperCase();
        const badge = document.getElementById('resultSesi');
        badge.className = 'badge-sesi ' + (d.manual ? 'badge-manual' : (d.dalam_sesi ? 'badge-active' : 'badge-outside'));
        document.getElementById('resultContainer').classList.remove('d-none');
        document.getElementById('resultContainer').scrollIntoView({ behavior:'smooth', block:'center' });
    }

    function resetScan() {
        currentScanData = null;
        document.getElementById('resultContainer').classList.add('d-none');
    }

    // ============================================================
    //  9. KONFIRMASI ABSENSI + INTEGRASI IZIN
    // ============================================================
    async function confirmAbsensi() {
        if (!currentScanData) return;
        const btn = document.getElementById('btnConfirm');
        btn.disabled = true;
        btn.innerHTML = 'Mencatat...';

        const statusKehadiran = document.getElementById('statusKehadiranSelect').value;
        const puasa = document.querySelector('input[name="puasa"]:checked')?.value || 'Tidak';
        const pelanggaran = document.getElementById('pelanggaranSelect').value;
        const pelanggaranKeterangan = document.getElementById('pelanggaranKeteranganContainer').style.display === 'block'
            ? document.getElementById('pelanggaranKeterangan').value.trim()
            : '';
        const kondisiKesehatan = document.querySelector('input[name="kesehatan"]:checked')?.value || 'Sehat';
        const keteranganKesehatan = document.getElementById('kesehatanKeteranganContainer').style.display === 'block'
            ? document.getElementById('kesehatanKeterangan').value.trim()
            : '';

        // Jika status Izin, upload bukti surat
        let buktiSurat = '';
        if (statusKehadiran === 'Izin') {
            const fileInput = document.getElementById('izinBuktiSurat');
            if (fileInput.files && fileInput.files[0]) {
                if (fileInput.files[0].size > 50000) {
                    window.showToast('Ukuran file maksimal 50KB.', 'error');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-check-circle me-1"></i> Konfirmasi Absensi';
                    return;
                }
                buktiSurat = await new Promise(resolve => {
                    const reader = new FileReader();
                    reader.onload = e => resolve(e.target.result);
                    reader.readAsDataURL(fileInput.files[0]);
                });
            }
        }

        try {
            // 1. Catat absensi dengan status yang dipilih
            const hasilAbsensi = await API.recordAbsensi(
                currentScanData.code,
                currentScanData.nama,
                currentScanData.sesi,
                currentScanData.sesi_nama,
                user?.nama || 'Unknown',
                currentScanData.agama,
                puasa,
                pelanggaran,
                pelanggaranKeterangan,
                kondisiKesehatan,
                keteranganKesehatan,
                statusKehadiran
            );

            // 2. Jika status Izin dan ada bukti surat, simpan ke menu Izin
            if (statusKehadiran === 'Izin' && buktiSurat) {
                const dataIzin = {
                    kode_peserta: currentScanData.code,
                    nama_peserta: currentScanData.nama,
                    tanggal: new Date().toISOString().split('T')[0],
                    keterangan: 'Izin via scan QR',
                    petugas: user?.nama || 'Unknown',
                    bukti_surat: buktiSurat
                };
                await API.addIzin(dataIzin);
            }

            if (hasilAbsensi.status === 'recorded') {
                addLocalLog('recorded');
                resetScan();
                window.showToast('✅ Tercatat (Izin + surat jika ada)', 'success');
            } else if (hasilAbsensi.status === 'already_recorded') {
                addLocalLog('duplicate');
                resetScan();
                window.showToast('⚠️ Sudah tercatat sebelumnya', 'warning');
            } else {
                window.showToast(hasilAbsensi.message, 'error');
            }
        } catch(e) {
            window.showToast('Gagal server', 'error');
        }
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-check-circle me-1"></i> Konfirmasi Absensi';
    }

    // ============================================================
    //  10. LOG ABSENSI
    // ============================================================
    function addLocalLog(status) {
        localLog.unshift({
            nama: currentScanData.nama,
            kode: currentScanData.code,
            sesi: currentScanData.sesi_nama + (currentScanData.manual ? ' (M)' : ''),
            jam: new Date().toLocaleTimeString('id-ID', { hour:'2-digit', minute:'2-digit' }),
            status
        });
        if (localLog.length > 30) localLog.pop();
        localStorage.setItem('srma19_absensi_log', JSON.stringify(localLog));
        renderLog();
    }

    function loadLocalLog() {
        const saved = localStorage.getItem('srma19_absensi_log');
        if (saved) try { localLog = JSON.parse(saved); } catch(e) {}
        renderLog();
    }

    function clearLocalLog() {
        if (confirm('Hapus log?')) {
            localLog = [];
            localStorage.removeItem('srma19_absensi_log');
            renderLog();
        }
    }

    function renderLog() {
        const container = document.getElementById('logContainer');
        if (!container) return;
        if (localLog.length) {
            container.innerHTML = localLog.map(l =>
                `<div class="log-item"><span><i class="fas ${l.status==='duplicate'?'fa-exclamation-triangle text-warning':'fa-check-circle text-success'}"></i> ${l.nama}</span><span class="small text-muted">${l.sesi} | ${l.jam}</span></div>`
            ).join('');
        } else {
            container.innerHTML = '<p class="text-center text-muted py-3 small">Belum ada data</p>';
        }
    }

    // ============================================================
    //  11. TEST KONEKSI
    // ============================================================
    async function testConnection() {
        try {
            const r = await API.ping();
            document.getElementById('connectionStatus').innerHTML = r.status === 'ok'
                ? '<span class="pulse-dot me-1"></span><span class="text-success">Terhubung</span>'
                : '<i class="fas fa-exclamation-triangle text-warning me-1"></i>Respons tidak dikenal';
        } catch(e) {
            document.getElementById('connectionStatus').innerHTML = '<i class="fas fa-times-circle text-danger me-1"></i>Gagal';
        }
    }

    // ============================================================
    //  12. INIT
    // ============================================================
    document.addEventListener('DOMContentLoaded', function() {
        fetchJadwal();
        loadLocalLog();
        updateSesiDisplay();
        testConnection();
        initBeepAudio();
        restoreManualState();
        setInterval(updateSesiDisplay, 30000);
        setTimeout(() => { if (!isScanning) startScan(); }, 500);
    });
</script>
